<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rilevamento Oggetti Smartphone</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #000; font-family: sans-serif; }
        h2 { color: #fff; margin: 10px 0; font-size: 16px; }
        .container { position: relative; width: 100%; max-width: 640px; }
        video { width: 100%; display: block; transform: scaleX(-1); } /* Effetto specchio */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        #status { color: #0f0; margin: 10px; font-weight: bold; }
        #loading { color: #ff0; }
    </style>
    <!-- Caricamento TensorFlow.js e Coco-SSD -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

    <h2>Object Detection Mobile</h2>
    <div id="status">Caricamento modello...</div>
    
    <div class="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let model = null;

        // 1. Caricamento Modello
        async function loadModel() {
            try {
                model = await cocoSsd.load();
                status.innerText = "Modello pronto. Avvio camera...";
                status.style.color = "#0f0";
                startCamera();
            } catch (error) {
                status.innerText = "Errore caricamento modello: " + error.message;
                status.style.color = "#f00";
            }
        }

        // 2. Accesso Fotocamera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } // Usa camera posteriore
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    status.innerText = "Rilevamento in corso...";
                    detectFrame();
                };
            } catch (err) {
                status.innerText = "Errore camera: " + err.message + " (Richiede HTTPS)";
                status.style.color = "#f00";
            }
        }

        // 3. Rilevamento e Disegno
        async function detectFrame() {
            if (!model) return;
            
            // Esegui predizione
            const predictions = await model.detect(video);
            
            // Pulisci canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Disegna risultati
            predictions.forEach(pred => {
                const [x, y, width, height] = pred.bbox;
                
                // Riquadro
                ctx.strokeStyle = '#00FF00';
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, width, height);
                
                // Sfondo etichetta
                ctx.fillStyle = '#00FF00';
                const text = `${pred.class} (${Math.round(pred.score * 100)}%)`;
                const textWidth = ctx.measureText(text).width;
                ctx.fillRect(x, y - 20, textWidth + 10, 20);
                
                // Testo
                ctx.fillStyle = '#000000';
                ctx.font = '16px Arial';
                ctx.fillText(text, x + 5, y - 5);
            });

            // Loop
            requestAnimationFrame(detectFrame);
        }

        // Avvio
        loadModel();
    </script>
</body>
</html>
